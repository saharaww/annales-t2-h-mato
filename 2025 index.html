    <style>
        :root {

            --ocre: #c67a43;       /* Couleur ocre principale */

        }

        }

            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--ocre-dark);
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
            border-bottom: 3px solid var(--ocre);
            padding-bottom: 10px;
        }

        /* Barre de contrôle du haut */
        .dashboard {
            position: sticky;
            top: 0;
            background-color: var(--white);
            z-index: 100;
            padding: 15px 0;
            border-bottom: 2px solid var(--bg-neutral);
            margin-bottom: 25px;
        }

        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--ocre);
            transition: width 0.3s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-box {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--ocre-dark);
        }

        .btn {
            background-color: var(--ocre);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--ocre-dark);
        }

        .btn-secondary {
            background-color: #795548;
        }
        .btn-secondary:hover {
            background-color: #4e342e;
        }

        /* Structure des blocs de questions */
        .question-block {
            background-color: var(--gray-light);
            border: 1px solid #ebdccb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--ocre-dark);
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--ocre-light);
            padding-bottom: 5px;
        }

        .question-context {
            font-style: italic;
            background-color: #f0eae1;
            padding: 10px;
            border-left: 4px solid var(--ocre);
            margin-bottom: 15px;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Options */
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }

        .option-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--white);
        }

        .option-item:hover {
            background-color: #fcf8f2;
            border-color: var(--ocre-light);
        }

        .option-item.selected {
            background-color: var(--ocre-light);
            border-color: var(--ocre);
        }

        /* Justifications cachées par défaut */
        .justification {
            display: none;
            font-size: 0.9rem;
            margin-top: 5px;
            padding-top: 5px;
            color: #555;
            border-top: 1px dotted #ccc;
        }

        /* Styles de correction */
        .corrected .option-item {
            cursor: not-allowed;
        }
        .corrected .justification {
            display: block;
        }

        /* Classes appliquées aux options validées */
        .option-item.correct-answer {
            border: 2px solid var(--green-success) !important;
            background-color: #e8f5e9 !important;
        }
        .option-item.wrong-answer {
            border: 2px solid var(--red-error) !important;
            background-color: #ffeedd !important;
        }
        .option-item.selected.wrong-selection {
            background-color: #ffebee !important;
            border: 2px solid var(--red-error) !important;
        }

        /* Zone QROC */
        .qroc-container {
            margin-bottom: 15px;
        }
        .qroc-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .qroc-answer {
            display: none;
            background-color: #edf2f7;
            border-left: 4px solid #4a5568;
            padding: 12px;
            border-radius: 0 6px 6px 0;
            margin-top: 10px;
        }

        /* Actions par question */
        .question-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .score-display {
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.95rem;
        }
    </style>
</head>

// Variable globale pour stocker les choix de l'utilisateur
// Structure: { questionId: [indices des options sélectionnées] ou "texte pour QROC" }
let userSelections = {};
// Statut de validation par question
let validatedQuestions = {};

// Initialisation du Quiz
function initQuiz() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';

    quizData.forEach((q) => {
        userSelections[q.id] = q.type === "QRM" || q.type === "QRU" ? [] : "";
        validatedQuestions[q.id] = false;

        const block = document.createElement('div');
        block.className = 'question-block';
        block.id = `qblock-${q.id}`;

        let html = `
            <div class="question-header">
                <span>${q.element} - Question ${q.id} [${q.type}]</span>
                <span id="score-val-${q.id}">--</span>
            </div>
        `;

        if (q.context) {
            html += `<div class="question-context">${q.context}</div>`;
        }

        html += `<div class="question-text">${q.text}</div>`;

        if (q.type === "QRU" || q.type === "QRM") {
            html += `<ul class="options-list">`;
            q.options.forEach((opt, idx) => {
                html += `
                    <li class="option-item" id="opt-${q.id}-${idx}" onclick="selectOption(${q.id}, ${idx}, '${q.type}')">
                        ${opt.text}
                        <div class="justification" id="justif-${q.id}-${idx}">${opt.justification}</div>
                    </li>
                `;
            });
            html += `</ul>`;
        } else if (q.type === "QROC") {
            html += `
                <div class="qroc-container">
                    <input type="text" class="qroc-input" id="qroc-input-${q.id}" placeholder="Tapez votre réponse libre ici..." oninput="updateQrocText(${q.id})">
                    <div class="qroc-answer" id="qroc-ans-${q.id}">
                        <strong>Réponse attendue :</strong> ${q.correctAnswer}
                    </div>
                </div>
            `;
        }

        html += `
            <div class="question-actions">
                <button class="btn btn-secondary" onclick="revealQuestion(${q.id})">Voir la réponse</button>
                <button class="btn" id="btn-val-${q.id}" onclick="validateQuestion(${q.id})">Valider</button>
            </div>
        `;

        block.innerHTML = html;
        container.appendChild(block);
    });

    updateGlobalProgress();
}

// Gestion des sélections d'options (QRU / QRM)
function selectOption(qId, optIdx, qType) {
    if (validatedQuestions[qId]) return; // Bloqué si déjà validé

    if (qType === "QRU") {
        // Décocher les autres
        const question = quizData.find(q => q.id === qId);
        question.options.forEach((_, idx) => {
            document.getElementById(`opt-${qId}-${idx}`).classList.remove('selected');
        });
        userSelections[qId] = [optIdx];
        document.getElementById(`opt-${qId}-${optIdx}`).classList.add('selected');
    } else if (qType === "QRM") {
        const arr = userSelections[qId];
        const index = arr.indexOf(optIdx);
        if (index > -1) {
            arr.splice(index, 1);
            document.getElementById(`opt-${qId}-${optIdx}`).classList.remove('selected');
        } else {
            arr.push(optIdx);
            document.getElementById(`opt-${qId}-${optIdx}`).classList.add('selected');
        }
    }
}

// Mise à jour de la réponse textuelle des QROC
function updateQrocText(qId) {
    if (validatedQuestions[qId]) return;
    userSelections[qId] = document.getElementById(`qroc-input-${qId}`).value;
}

// Calcul du barème EDN pour une question donnée
function calculateEDNScore(q, selections) {
    if (q.type === "QRU") {
        const chosenIdx = selections[0];
        if (chosenIdx === undefined) return 0;
        return q.options[chosenIdx].isCorrect ? 1 : 0;
    }
    
    if (q.type === "QRM") {
        let errors = 0;
        q.options.forEach((opt, idx) => {
            const isSelected = selections.includes(idx);
            if (isSelected !== opt.isCorrect) {
                errors++;
            }
        });

        if (errors === 0) return 1;
        if (errors === 1) return 0.5;
        if (errors === 2) return 0.2;
        return 0;
    }

    return null; // Pas de note pour les QROC
}

// Validation unitaire d'une question au clic sur "Valider"
function validateQuestion(qId) {
    if (validatedQuestions[qId]) return;

    const q = quizData.find(question => question.id === qId);
    validatedQuestions[qId] = true;

    const block = document.getElementById(`qblock-${qId}`);
    block.classList.add('corrected');

    // Désactiver le bouton valider
    document.getElementById(`btn-val-${qId}`).disabled = true;

    if (q.type === "QRU" || q.type === "QRM") {
        const selections = userSelections[qId];
        
        q.options.forEach((opt, idx) => {
            const optElem = document.getElementById(`opt-${qId}-${idx}`);
            
            // Coloration des bordures et fonds selon la justesse
            if (opt.isCorrect) {
                optElem.classList.add('correct-answer');
            } else if (!opt.isCorrect && selections.includes(idx)) {
                optElem.classList.add('wrong-selection');
            } else {
                optElem.classList.add('wrong-answer');
            }
        });

        // Calcul et affichage de la note EDN
        const score = calculateEDNScore(q, selections);
        document.getElementById(`score-val-${qId}`).innerText = `${score} / 1`;
    } else if (q.type === "QROC") {
        document.getElementById(`qroc-ans-${qId}`).style.display = 'block';
        document.getElementById(`qroc-input-${qId}`).disabled = true;
        document.getElementById(`score-val-${qId}`).innerText = "Non noté";
    }

    updateGlobalProgress();
}

// Révéler immédiatement la réponse d'une question (Bouton "Voir la réponse")
function revealQuestion(qId) {
    validateQuestion(qId);
}

// Tout révéler en haut de la page
function revealAll() {
    quizData.forEach(q => {
        validateQuestion(q.id);
    });
}

// Recalculer le score total global et la barre de progression
function updateGlobalProgress() {
    let totalScore = 0;
    let maxScorableQuestions = 0;
    let answeredCount = 0;

    quizData.forEach(q => {
        if (q.type !== "QROC") {
            maxScorableQuestions++;
            if (validatedQuestions[q.id]) {
                totalScore += calculateEDNScore(q, userSelections[q.id]);
            }
        }
        if (validatedQuestions[q.id]) {
            answeredCount++;
        }
    });

    // Progression
    const pct = (answeredCount / quizData.length) * 100;
    document.getElementById('progressBar').style.width = `${pct}%`;

    // Affichage score global
    document.getElementById('scoreBox').innerText = `Score global EDN : ${totalScore.toFixed(1)} / ${maxScorableQuestions}.0`;
}

// Recommencer le quiz à zéro
function resetQuiz() {
    userSelections = {};
    validatedQuestions = {};
    initQuiz();
}

// Lancement au chargement complet du script
window.onload = initQuiz;
</script>
